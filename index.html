<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduly Pro - Smart Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        body { scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom Scrollbar for dark mode */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen pb-12 selection:bg-indigo-200 selection:text-indigo-900 transition-colors duration-300">

    <header class="bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50 shadow-sm backdrop-blur-lg transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center space-x-3 w-full md:w-auto justify-between md:justify-start">
                <div class="flex items-center space-x-3">
                    <div class="bg-gradient-to-tr from-indigo-600 to-violet-500 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-200 dark:shadow-none hover:scale-105 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 dark:text-white tracking-tight flex items-center">
                            Scheduly 
                            <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-100 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 rounded-full ml-2 uppercase tracking-wider">Pro</span>
                        </h1>
                        <span id="current-time" class="block text-xs text-indigo-600 dark:text-indigo-400 font-bold"></span>
                    </div>
                </div>
                
                <button onclick="toggleTheme()" class="p-2.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <svg id="theme-icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="theme-icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full md:w-auto">
                <div class="relative w-full sm:w-64">
                    <input type="text" id="search-input" placeholder="Cari jadwal..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:text-white transition-all">
                    <svg class="w-4 h-4 absolute left-3.5 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                
                <select id="view-selector" class="w-full sm:w-auto px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm font-medium text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer transition-all">
                    <option value="7">Lihat 7 Hari</option>
                    <option value="14">Lihat 14 Hari</option>
                    <option value="30">Lihat 30 Hari</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-xl shadow-slate-200/40 dark:shadow-none sticky top-28 transition-colors duration-300">
                <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-5 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                    </svg>
                    Tambah Jadwal
                </h2>
                <form id="schedule-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Nama Kegiatan</label>
                        <input type="text" id="event-title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all hover:border-indigo-300 dark:hover:border-indigo-500" placeholder="Contoh: Meeting Proyek">
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Pilih Tanggal</label>
                        <select id="event-date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all cursor-pointer">
                            </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Jam Mulai</label>
                            <input type="time" id="event-time" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Durasi (Menit)</label>
                            <input type="number" id="event-duration" min="5" value="60" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5">Catatan (Opsional)</label>
                        <textarea id="event-desc" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900/50 dark:text-white focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition-all resize-none" placeholder="Link zoom atau detail lain..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-200 dark:shadow-none transition-all duration-200 flex justify-center items-center space-x-2 text-sm mt-4">
                        <span>Simpan Jadwal</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6" id="timeline-container">
            </div>

    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        // State management
        let events = JSON.parse(localStorage.getItem('scheduly_events')) || [];
        let currentDays = 7;
        let searchQuery = '';
        let generatedDays = [];

        // --- THEME LOGIC ---
        const initTheme = () => {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        };
        const toggleTheme = () => {
            document.documentElement.classList.toggle('dark');
            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        };
        initTheme(); // Run on load

        // --- UTILITY LOGIC ---
        const showToast = (msg, type = 'success') => {
            Toastify({
                text: msg,
                duration: 3000,
                gravity: "bottom", position: "right", 
                style: {
                    background: type === 'success' ? "#10B981" : "#EF4444",
                    borderRadius: "10px", fontSize: "14px", fontWeight: "500"
                }
            }).showToast();
        };

        const generateDaysArray = (daysCount) => {
            const days = [];
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            for (let i = 0; i < daysCount; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                const offset = date.getTimezoneOffset() * 60000;
                const dateString = (new Date(date.getTime() - offset)).toISOString().split('T')[0];
                const label = date.toLocaleDateString('id-ID', options);
                days.push({ dateString, label, isToday: i === 0 });
            }
            return days;
        };

        const populateDateDropdown = () => {
            const select = document.getElementById('event-date');
            select.innerHTML = '';
            generatedDays.forEach(day => {
                const option = document.createElement('option');
                option.value = day.dateString;
                option.textContent = day.isToday ? `Hari Ini - ${day.label}` : day.label;
                select.appendChild(option);
            });
        };

        const generateTrueICS = (event) => {
            const [year, month, day] = event.date.split('-');
            const [hours, minutes] = event.time.split(':');
            const startDate = new Date(year, month - 1, day, hours, minutes);
            const endDate = new Date(startDate.getTime() + event.duration * 60000);
            const formatDateICS = (date) => date.toISOString().replace(/-|:|\.\d\d\d/g, "");
            
            const icsContent = [
                "BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//Scheduly App//ID", "BEGIN:VEVENT",
                `UID:${event.id}@scheduly`, `DTSTAMP:${formatDateICS(new Date())}`,
                `DTSTART:${formatDateICS(startDate)}`, `DTEND:${formatDateICS(endDate)}`,
                `SUMMARY:${event.title}`, `DESCRIPTION:${event.description || ''}`,
                "END:VEVENT", "END:VCALENDAR"
            ].join("\n");

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', `${event.title.replace(/\s+/g, '_')}.ics`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast("Jadwal diunduh!");
        };

        // --- RENDER LOGIC ---
        const renderTimeline = () => {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            generatedDays.forEach(day => {
                // Filter by Date AND Search Query
                const dayEvents = events
                    .filter(e => e.date === day.dateString)
                    .filter(e => e.title.toLowerCase().includes(searchQuery) || e.description.toLowerCase().includes(searchQuery))
                    .sort((a, b) => a.time.localeCompare(b.time));

                // Jika sedang mencari dan tidak ada hasil di hari ini, sembunyikan hari tersebut
                if (searchQuery !== '' && dayEvents.length === 0) return;

                // Indikator Kepadatan
                let densityIndicator = '';
                if (dayEvents.length === 0) densityIndicator = `<span title="Kosong" class="w-2.5 h-2.5 rounded-full bg-slate-200 dark:bg-slate-700"></span>`;
                else if (dayEvents.length <= 2) densityIndicator = `<span title="Santai" class="w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.5)]"></span>`;
                else densityIndicator = `<span title="Sibuk" class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)] animate-pulse"></span>`;

                const daySection = document.createElement('div');
                daySection.className = `fade-in bg-white dark:bg-slate-800 rounded-3xl border ${day.isToday ? 'border-indigo-200 dark:border-indigo-500/30 ring-4 ring-indigo-500/10 dark:ring-indigo-500/10' : 'border-slate-200 dark:border-slate-700'} p-6 sm:p-8 shadow-sm transition-all duration-300`;
                
                let eventsHTML = '';
                if (dayEvents.length === 0) {
                    eventsHTML = `
                        <div class="flex flex-col items-center justify-center py-6">
                            <lottie-player src="https://lottie.host/e7ed7be7-8328-4be6-a4c3-1fb8efb36ebc/JvQW1a7L0J.json" background="transparent" speed="1" style="width: 120px; height: 120px;" loop autoplay opacity="0.6"></lottie-player>
                            <p class="text-sm text-slate-400 dark:text-slate-500 font-medium mt-2">Belum ada agenda</p>
                        </div>`;
                } else {
                    dayEvents.forEach(e => {
                        eventsHTML += `
                            <div class="flex items-start justify-between p-4 bg-slate-50/50 dark:bg-slate-700/30 rounded-2xl border border-slate-100 dark:border-slate-700/50 hover:border-indigo-200 dark:hover:border-indigo-500 hover:bg-white dark:hover:bg-slate-800 hover:shadow-md transition-all duration-300 group mb-3 last:mb-0">
                                <div class="space-y-1.5 w-full pr-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="text-xs font-bold px-2.5 py-1 bg-indigo-100 dark:bg-indigo-500/20 text-indigo-700 dark:text-indigo-300 rounded-lg">${e.time}</span>
                                        <h4 class="text-sm font-bold text-slate-900 dark:text-white">${e.title}</h4>
                                    </div>
                                    ${e.description ? `<p class="text-sm text-slate-500 dark:text-slate-400 pl-1 border-l-2 border-slate-200 dark:border-slate-600 ml-1.5 mt-2 py-0.5">${e.description}</p>` : ''}
                                    <div class="flex items-center text-[11px] font-semibold text-slate-400 dark:text-slate-500 pl-1.5 pt-1">
                                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${e.duration} Menit
                                    </div>
                                </div>
                                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-all duration-300">
                                    <button onclick="syncToDevice('${e.id}')" title="Simpan ke Kalender HP" class="p-2 text-indigo-500 dark:text-indigo-400 hover:text-white dark:hover:text-white hover:bg-indigo-500 rounded-xl transition-colors bg-indigo-50 dark:bg-indigo-500/10">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    </button>
                                    <button onclick="confirmDelete('${e.id}')" title="Hapus" class="p-2 text-rose-500 dark:text-rose-400 hover:text-white dark:hover:text-white hover:bg-rose-500 rounded-xl transition-colors bg-rose-50 dark:bg-rose-500/10">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }

                daySection.innerHTML = `
                    <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-100 dark:border-slate-700">
                        <div class="flex items-center space-x-3">
                            ${densityIndicator}
                            <h3 class="text-base font-bold ${day.isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-800 dark:text-white'}">${day.label}</h3>
                            ${day.isToday ? '<span class="text-[10px] font-extrabold uppercase tracking-wider bg-indigo-600 dark:bg-indigo-500 text-white px-2.5 py-1 rounded-md animate-pulse">Hari Ini</span>' : ''}
                        </div>
                        <span class="text-xs font-bold bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-300 px-2.5 py-1 rounded-md">${dayEvents.length} Jadwal</span>
                    </div>
                    <div>${eventsHTML}</div>
                `;
                container.appendChild(daySection);
            });
            
            // Tampilan jika pencarian tidak membuahkan hasil sama sekali
            if (searchQuery !== '' && container.innerHTML === '') {
                container.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700">
                        <svg class="w-16 h-16 text-slate-300 dark:text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <h3 class="text-lg font-bold text-slate-700 dark:text-slate-300">Jadwal tidak ditemukan</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Coba gunakan kata kunci lain.</p>
                    </div>
                `;
            }
        };

        // --- EVENT LISTENERS ---
        // Change View (7/14/30 Days)
        document.getElementById('view-selector').addEventListener('change', (e) => {
            currentDays = parseInt(e.target.value);
            generatedDays = generateDaysArray(currentDays);
            populateDateDropdown();
            renderTimeline();
        });

        // Search Filter
        document.getElementById('search-input').addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase().trim();
            renderTimeline();
        });

        // Submit Form
        document.getElementById('schedule-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const newEvent = {
                id: 'evt_' + Date.now(),
                title: document.getElementById('event-title').value,
                date: document.getElementById('event-date').value,
                time: document.getElementById('event-time').value,
                duration: parseInt(document.getElementById('event-duration').value),
                description: document.getElementById('event-desc').value
            };
            events.push(newEvent);
            localStorage.setItem('scheduly_events', JSON.stringify(events));
            
            // Reset
            document.getElementById('event-title').value = '';
            document.getElementById('event-desc').value = '';
            renderTimeline();
            showToast("Jadwal berhasil ditambahkan!");
        });

        // Delete with SweetAlert2
        window.confirmDelete = (id) => {
            const isDark = document.documentElement.classList.contains('dark');
            Swal.fire({
                title: 'Hapus Jadwal?',
                text: "Data ini tidak bisa dikembalikan setelah dihapus.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#4f46e5',
                cancelButtonColor: '#ef4444',
                confirmButtonText: 'Ya, Hapus',
                cancelButtonText: 'Batal',
                background: isDark ? '#1e293b' : '#ffffff',
                color: isDark ? '#ffffff' : '#0f172a',
            }).then((result) => {
                if (result.isConfirmed) {
                    events = events.filter(e => e.id !== id);
                    localStorage.setItem('scheduly_events', JSON.stringify(events));
                    renderTimeline();
                    showToast("Jadwal dihapus", "error");
                }
            });
        };

        // Sync to Device
        window.syncToDevice = (id) => {
            const event = events.find(e => e.id === id);
            if (event) generateTrueICS(event);
        };

        // Clock Update
        setInterval(() => {
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
        }, 1000);

        // Init
        generatedDays = generateDaysArray(currentDays);
        populateDateDropdown();
        renderTimeline();
    </script>
</body>
</html>
