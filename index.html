<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduly - 7 Days Planner & Reminder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen pb-12 selection:bg-indigo-100 selection:text-indigo-900">

    <header class="bg-white/80 border-b border-slate-200 sticky top-0 z-50 shadow-sm backdrop-blur-lg">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-tr from-indigo-600 to-violet-500 text-white p-2.5 rounded-xl shadow-lg shadow-indigo-200 hover:scale-105 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900 tracking-tight flex items-center">
                        Scheduly 
                        <span class="text-[10px] font-bold px-2 py-0.5 bg-indigo-100 text-indigo-700 rounded-full ml-2 uppercase tracking-wider">Pro</span>
                    </h1>
                    <p class="text-xs text-slate-500 font-medium">7 Days Smart Planner</p>
                </div>
            </div>
            <div class="text-right">
                <span id="current-time" class="block text-sm text-indigo-600 font-bold"></span>
                <span id="current-date" class="text-xs text-slate-500 font-medium"></span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-xl shadow-slate-200/40 sticky top-28">
                <h2 class="text-lg font-bold text-slate-900 mb-5 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-indigo-500" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd" />
                    </svg>
                    Tambah Jadwal
                </h2>
                <form id="schedule-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Nama Kegiatan</label>
                        <input type="text" id="event-title" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all hover:border-indigo-300" placeholder="Contoh: Meeting Proyek">
                    </div>
                    
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Pilih Tanggal</label>
                        <select id="event-date" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all bg-white hover:border-indigo-300 cursor-pointer">
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Jam Mulai</label>
                            <input type="time" id="event-time" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all hover:border-indigo-300 cursor-pointer">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Durasi (Menit)</label>
                            <input type="number" id="event-duration" min="5" value="60" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all hover:border-indigo-300">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-1.5">Catatan (Opsional)</label>
                        <textarea id="event-desc" rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm transition-all hover:border-indigo-300 resize-none" placeholder="Link zoom atau detail lain..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 active:scale-95 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-indigo-200 transition-all duration-200 flex justify-center items-center space-x-2 text-sm mt-4">
                        <span>Simpan Jadwal</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-6" id="timeline-container">
            </div>

    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        // State management
        let events = JSON.parse(localStorage.getItem('scheduly_events')) || [];

        // Utility: Notifikasi Elegan
        const showToast = (msg, type = 'success') => {
            Toastify({
                text: msg,
                duration: 3000,
                gravity: "bottom", 
                position: "right", 
                style: {
                    background: type === 'success' ? "#10B981" : "#EF4444",
                    borderRadius: "10px",
                    fontSize: "14px",
                    fontWeight: "500",
                    boxShadow: "0 4px 6px -1px rgba(0, 0, 0, 0.1)"
                }
            }).showToast();
        };

        // Inisialisasi tanggal dengan perhitungan Timezone Lokal yang aman
        const getNext7Days = () => {
            const days = [];
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            
            for (let i = 0; i < 7; i++) {
                const date = new Date();
                date.setDate(date.getDate() + i);
                
                // Ambil string tanggal lokal (YYYY-MM-DD) yang kebal bug UTC
                const offset = date.getTimezoneOffset() * 60000;
                const dateString = (new Date(date.getTime() - offset)).toISOString().split('T')[0];
                
                const label = date.toLocaleDateString('id-ID', options);
                days.push({ dateString, label, isToday: i === 0 });
            }
            return days;
        };

        const next7Days = getNext7Days();

        // Tampilkan opsi tanggal di Form
        const populateDateDropdown = () => {
            const select = document.getElementById('event-date');
            next7Days.forEach(day => {
                const option = document.createElement('option');
                option.value = day.dateString;
                option.textContent = day.isToday ? `Hari Ini - ${day.label}` : day.label;
                select.appendChild(option);
            });
        };

        // Fungsi Universal: Buat file .ICS sungguhan agar otomatis terbaca di Calendar Apple/Android
        const generateTrueICS = (event) => {
            const [year, month, day] = event.date.split('-');
            const [hours, minutes] = event.time.split(':');
            
            const startDate = new Date(year, month - 1, day, hours, minutes);
            const endDate = new Date(startDate.getTime() + event.duration * 60000);

            const formatDateICS = (date) => date.toISOString().replace(/-|:|\.\d\d\d/g, "");
            
            const icsContent = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//Scheduly App//ID",
                "BEGIN:VEVENT",
                `UID:${event.id}@scheduly`,
                `DTSTAMP:${formatDateICS(new Date())}`,
                `DTSTART:${formatDateICS(startDate)}`,
                `DTEND:${formatDateICS(endDate)}`,
                `SUMMARY:${event.title}`,
                `DESCRIPTION:${event.description || ''}`,
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\n");

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', `${event.title.replace(/\s+/g, '_')}.ics`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            showToast("Jadwal diunduh, buka untuk simpan ke kalender HP!");
        };

        // Render Timeline
        const renderTimeline = () => {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';

            next7Days.forEach(day => {
                const dayEvents = events
                    .filter(e => e.date === day.dateString)
                    .sort((a, b) => a.time.localeCompare(b.time));

                const daySection = document.createElement('div');
                daySection.className = `fade-in bg-white rounded-3xl border ${day.isToday ? 'border-indigo-200 ring-4 ring-indigo-500/10' : 'border-slate-200'} p-6 sm:p-8 shadow-sm transition-all`;
                
                let eventsHTML = '';
                if (dayEvents.length === 0) {
                    eventsHTML = `
                        <div class="flex flex-col items-center justify-center py-6 opacity-50">
                            <svg class="w-10 h-10 text-slate-300 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            <p class="text-sm text-slate-400 font-medium">Belum ada agenda</p>
                        </div>`;
                } else {
                    dayEvents.forEach(e => {
                        eventsHTML += `
                            <div class="flex items-start justify-between p-4 bg-slate-50/50 rounded-2xl border border-slate-100 hover:border-indigo-200 hover:bg-white hover:shadow-md transition-all duration-300 group mb-3 last:mb-0">
                                <div class="space-y-1.5 w-full pr-4">
                                    <div class="flex items-center space-x-3">
                                        <span class="text-xs font-bold px-2.5 py-1 bg-indigo-100 text-indigo-700 rounded-lg">${e.time}</span>
                                        <h4 class="text-sm font-bold text-slate-900">${e.title}</h4>
                                    </div>
                                    ${e.description ? `<p class="text-sm text-slate-500 pl-1 border-l-2 border-slate-200 ml-1.5 mt-2 py-0.5">${e.description}</p>` : ''}
                                    <div class="flex items-center text-[11px] font-semibold text-slate-400 pl-1.5 pt-1">
                                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        ${e.duration} Menit
                                    </div>
                                </div>
                                <div class="flex flex-col sm:flex-row space-y-2 sm:space-y-0 sm:space-x-2 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-all duration-300">
                                    <button onclick="syncToDevice('${e.id}')" title="Simpan ke Kalender HP" class="p-2 text-indigo-500 hover:text-white hover:bg-indigo-500 rounded-xl transition-colors bg-indigo-50">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                                    </button>
                                    <button onclick="deleteEvent('${e.id}')" title="Hapus" class="p-2 text-rose-500 hover:text-white hover:bg-rose-500 rounded-xl transition-colors bg-rose-50">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                }

                daySection.innerHTML = `
                    <div class="flex justify-between items-center mb-5 pb-3 border-b border-slate-100">
                        <div class="flex items-center space-x-3">
                            <h3 class="text-base font-bold ${day.isToday ? 'text-indigo-600' : 'text-slate-800'}">${day.label}</h3>
                            ${day.isToday ? '<span class="text-[10px] font-extrabold uppercase tracking-wider bg-indigo-600 text-white px-2.5 py-1 rounded-md animate-pulse">Hari Ini</span>' : ''}
                        </div>
                        <span class="text-xs font-bold bg-slate-100 text-slate-500 px-2 py-1 rounded-md">${dayEvents.length}</span>
                    </div>
                    <div>${eventsHTML}</div>
                `;
                container.appendChild(daySection);
            });
        };

        // Form Submit
        document.getElementById('schedule-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newEvent = {
                id: 'evt_' + Date.now(),
                title: document.getElementById('event-title').value,
                date: document.getElementById('event-date').value,
                time: document.getElementById('event-time').value,
                duration: parseInt(document.getElementById('event-duration').value),
                description: document.getElementById('event-desc').value
            };

            events.push(newEvent);
            localStorage.setItem('scheduly_events', JSON.stringify(events));
            
            // Reset form
            document.getElementById('event-title').value = '';
            document.getElementById('event-time').value = '';
            document.getElementById('event-desc').value = '';
            
            renderTimeline();
            showToast("Jadwal berhasil ditambahkan!");
        });

        // Hapus Event
        window.deleteEvent = (id) => {
            events = events.filter(e => e.id !== id);
            localStorage.setItem('scheduly_events', JSON.stringify(events));
            renderTimeline();
            showToast("Jadwal dihapus", "error");
        };

        // Sinkronisasi Kalender
        window.syncToDevice = (id) => {
            const event = events.find(e => e.id === id);
            if (event) generateTrueICS(event);
        };

        // Jam & Tanggal Realtime
        const updateClock = () => {
            const now = new Date();
            document.getElementById('current-time').textContent = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }) + ' WIB';
            document.getElementById('current-date').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        };
        setInterval(updateClock, 1000);
        updateClock();

        // Run On Load
        populateDateDropdown();
        renderTimeline();
    </script>
</body>
</html>
